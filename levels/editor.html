<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Editor - TIG TV</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #222; color: #fff; margin: 0; }
        
        .setup-bar { background: #111; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #444; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .setup-bar input[type="number"] { width: 50px; padding: 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; }
        .setup-bar button { padding: 8px 12px; background: #0099ff; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .setup-bar button:hover { background: #007acc; }
        .setup-bar .btn-danger { background: #dc3545; margin-left: 10px; }
        .setup-bar .btn-danger:hover { background: #c82333; }
        .setup-bar .btn-import { background: #ff9900; }
        .setup-bar .btn-import:hover { background: #cc7a00; }
        .setup-bar .btn-save { background: #28a745; margin-left: auto; }
        .setup-bar .btn-save:hover { background: #218838; }
        .setup-bar .btn-github { background: #6f42c1; margin-left: 10px; }
        .setup-bar .btn-github:hover { background: #5a32a3; }
        
        .level-selector { display: flex; align-items: center; gap: 5px; padding-right: 15px; border-right: 2px solid #444; }
        .level-selector input { width: 40px !important; }

        .audio-section { background: #2a2a35; padding: 15px; border-radius: 5px; display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box; border: 1px solid #444; margin-bottom: 15px; }
        .audio-section input[type="file"] { color: #fff; width: 100%; }
        audio { width: 100%; height: 40px; outline: none; }
        
        .audio-controls { display: flex; gap: 10px; align-items: center; width: 100%; }
        .audio-btn { padding: 8px 15px; background: #444; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .audio-btn:hover { background: #666; }

        .toolbar { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .tool { padding: 10px 15px; border: 2px solid transparent; background: #444; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; flex-grow: 1; text-align: center; }
        .tool.active { border-color: #fff; background: #666; }
        
        .grid-container { overflow-x: auto; background: #333; padding: 10px; border-radius: 5px; margin-bottom: 15px; position: relative; }
        .grid { display: grid; gap: 1px; background: #555; width: max-content; }
        .cell { width: 30px; height: 30px; background: #111; display: flex; align-items: center; justify-content: center; font-family: monospace; font-size: 18px; cursor: pointer; user-select: none; }
        
        .cell[data-val="."] { background: #2a3b4c; color: transparent; } 
        .cell[data-val="="] { background: #ffffff; color: #000; } 
        .cell[data-val="#"] { background: #0099ff; border: 2px solid #000; box-sizing: border-box; } 
        .cell[data-val="^"] { background: #2a3b4c; color: yellow; font-size: 24px; } 
        .cell[data-val="C"] { background: #00ff00; color: #000; border: 2px solid #000; box-sizing: border-box; font-weight: bold; } 
        
        /* Stili per le Rampe */
        .cell[data-val="◢"], .cell[data-val="◣"] { background: #6c757d; color: #fff; font-size: 24px; }

        .cell.beat-marker[data-val="."] { background: #5c2a2a; border-left: 1px solid #ff4444; } 
        .cell.play-cursor { background: #00ffcc !important; opacity: 0.8; }

        #warning { font-weight: bold; min-height: 20px; margin-bottom: 10px; white-space: pre-line; }
        #info { color: #0099ff; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        
        textarea { width: 100%; height: 160px; background: #111; color: #0f0; font-family: monospace; border: none; padding: 10px; box-sizing: border-box; white-space: pre; overflow-wrap: normal; overflow-x: scroll; }
    </style>
</head>
<body>
    <h2>Level Editor Sincronizzato</h2>
    
    <div class="audio-section">
        <label style="font-weight: bold; color: #00ffcc;">1. Carica Audio (MP3):</label>
        <input type="file" id="audioInput" accept="audio/mpeg, audio/mp3, audio/wav, audio/ogg">
        <span id="analysisStatus" style="color: #aaa; font-size: 14px;">In attesa di file audio...</span>
        
        <audio id="audioPlayer" controls></audio>
        
        <div class="audio-controls">
            <button class="audio-btn" onclick="skipAudio(-1)">⏮ -1 Sec</button>
            <button class="audio-btn" onclick="skipAudio(1)">+1 Sec ⏭</button>
        </div>
    </div>

    <div class="setup-bar">
        <div class="level-selector">
            <label>ID Livello: </label>
            <input type="number" id="levelId" value="1" min="1">
            <button class="btn-github" onclick="fetchFromGitHub()">☁️ Scarica da GitHub (Livello + Audio)</button>
        </div>
        <label>Righe: <input type="number" id="rowsInput" value="10" min="4" max="50"></label>
        <label>Min: <input type="number" id="min" value="1" min="0"></label>
        <label>Sec: <input type="number" id="sec" value="30" min="0" max="59"></label>
        <button onclick="updateDimensions()">Applica Dimensioni</button>
        <button class="btn-danger" onclick="clearMap()">Svuota Mappa</button>
        <button class="btn-import" onclick="loadLevel()">Carica da Testo in basso</button>
        
        <button class="btn-save" onclick="downloadLevelFile()">⬇️ Salva File TXT</button>
    </div>

    <div class="toolbar" id="toolbar">
        <div class="tool active" data-brush=".">Aria (.)</div>
        <div class="tool" data-brush="=">Pavimento (=)</div>
        <div class="tool" data-brush="#">Blocco (#)</div>
        <div class="tool" data-brush="^">Spina (^)</div>
        <div class="tool" data-brush="C">Checkpoint (C)</div>
        <div class="tool" data-brush="◢">Rampa Dx (◢)</div>
        <div class="tool" data-brush="◣">Rampa Sx (◣)</div>
    </div>
    
    <div id="info">Durata attuale: 1m 30s (900 blocchi). Righe: 10. Velocità: 10 blocchi/sec.</div>
    <div id="warning">✔️ Livello fisicamente possibile.</div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>
    
    <p style="margin-bottom: 5px; font-weight: bold; font-size: 14px;">Codice del livello:</p>
    <textarea id="output"></textarea>

    <script>
        let COLS = 900; 
        let ROWS = parseInt(document.getElementById('rowsInput').value) || 10;
        let currentBrush = '.';
        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');
        const warningEl = document.getElementById('warning');
        const infoEl = document.getElementById('info');
        let mapData = [];
        let beatColumns = new Set();
        let lastCursorCol = -1;

        const audioInput = document.getElementById('audioInput');
        const audioPlayer = document.getElementById('audioPlayer');
        const analysisStatus = document.getElementById('analysisStatus');

        function skipAudio(seconds) {
            if (audioPlayer.src) {
                audioPlayer.currentTime += seconds;
            }
        }

        async function analyzeAudioBuffer(arrayBuffer) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const duration = audioBuffer.duration;
                document.getElementById('min').value = Math.floor(duration / 60);
                document.getElementById('sec').value = Math.floor(duration % 60);
                
                updateDimensions();

                const data = audioBuffer.getChannelData(0); 
                const samplesPerBlock = Math.floor(audioBuffer.sampleRate / 10);
                const energies = [];
                
                for (let i = 0; i < COLS; i++) {
                    let sum = 0;
                    const start = i * samplesPerBlock;
                    const end = Math.min(start + samplesPerBlock, data.length);
                    if (start >= data.length) break;
                    
                    for (let j = start; j < end; j++) {
                        sum += data[j] * data[j];
                    }
                    energies.push(Math.sqrt(sum / (end - start)));
                }

                beatColumns.clear();
                
                const windowSize = 10; 
                const sensitivity = 1.3; 

                for (let i = 2; i < energies.length - 2; i++) {
                    let localSum = 0;
                    let count = 0;
                    
                    let startWindow = Math.max(0, i - windowSize);
                    let endWindow = Math.min(energies.length - 1, i + windowSize);
                    
                    for (let w = startWindow; w <= endWindow; w++) {
                        localSum += energies[w];
                        count++;
                    }
                    
                    let localAvg = localSum / count;
                    let threshold = localAvg * sensitivity;

                    if (energies[i] > threshold && 
                        energies[i] > energies[i-1] && energies[i] > energies[i-2] &&
                        energies[i] > energies[i+1] && energies[i] > energies[i+2]) {
                        beatColumns.add(i);
                    }
                }

                analysisStatus.innerText = `Analisi completata. Trovati ${beatColumns.size} picchi ritmici.`;
                renderGrid(); 

            } catch (err) {
                console.error(err);
                analysisStatus.innerText = "Errore durante l'analisi audio. Il player funzionerà comunque.";
            }
        }

        audioInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            audioPlayer.src = URL.createObjectURL(file);
            analysisStatus.innerText = "Analisi volume e picchi in corso (potrebbe richiedere qualche secondo)...";
            try {
                const arrayBuffer = await file.arrayBuffer();
                await analyzeAudioBuffer(arrayBuffer);
            } catch (err) {
                console.error(err);
                analysisStatus.innerText = "Impossibile leggere il file locale.";
            }
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.paused && audioPlayer.currentTime === 0) return;
            const currentSec = audioPlayer.currentTime;
            const currentCol = Math.floor(currentSec * 10);
            
            if (currentCol !== lastCursorCol && currentCol < COLS) {
                if (lastCursorCol >= 0) {
                    for (let r = 0; r < ROWS; r++) {
                        const cell = document.getElementById(`cell-${r}-${lastCursorCol}`);
                        if (cell) cell.classList.remove('play-cursor');
                    }
                }
                for (let r = 0; r < ROWS; r++) {
                    const cell = document.getElementById(`cell-${r}-${currentCol}`);
                    if (cell) cell.classList.add('play-cursor');
                }
                
                const container = document.querySelector('.grid-container');
                const scrollTarget = (currentCol * 30) - (container.clientWidth / 2);
                container.scrollLeft = Math.max(0, scrollTarget);
                
                lastCursorCol = currentCol;
            }
        });

        audioPlayer.addEventListener('pause', clearCursor);
        audioPlayer.addEventListener('ended', clearCursor);

        function clearCursor() {
            if (lastCursorCol >= 0) {
                for (let r = 0; r < ROWS; r++) {
                    const cell = document.getElementById(`cell-${r}-${lastCursorCol}`);
                    if (cell) cell.classList.remove('play-cursor');
                }
                lastCursorCol = -1;
            }
        }

        function initMap() {
            mapData = Array(ROWS).fill().map(() => Array(COLS).fill('.'));
            for(let c=0; c<COLS; c++) mapData[ROWS-1][c] = '='; 
        }

        function clearMap() {
            if(confirm("Sei sicuro di voler svuotare completamente la mappa?")) {
                initMap();
                renderGrid();
            }
        }

        function updateDimensions() {
            let newRows = parseInt(document.getElementById('rowsInput').value);
            if(newRows < 4) { newRows = 4; document.getElementById('rowsInput').value = 4; }
            
            if(newRows > ROWS) {
                let diff = newRows - ROWS;
                for(let i=0; i<diff; i++) {
                    mapData.unshift(Array(COLS).fill('.'));
                }
            } else if(newRows < ROWS) {
                let diff = ROWS - newRows;
                for(let i=0; i<diff; i++) {
                    mapData.shift();
                }
            }
            ROWS = newRows;

            const m = parseInt(document.getElementById('min').value) || 0;
            const s = parseInt(document.getElementById('sec').value) || 0;
            const totalSeconds = (m * 60) + s;
            
            if (totalSeconds > 0) {
                let newCols = totalSeconds * 10; 
                if(newCols > COLS) {
                    let diff = newCols - COLS;
                    for(let r=0; r<ROWS; r++) {
                        let fillChar = (r === ROWS - 1) ? '=' : '.';
                        mapData[r].push(...Array(diff).fill(fillChar));
                    }
                } else if(newCols < COLS) {
                    for(let r=0; r<ROWS; r++) {
                        mapData[r].length = newCols;
                    }
                }
                COLS = newCols;
            }

            infoEl.innerText = `Durata: ${Math.floor(COLS/10/60)}m ${(COLS/10)%60}s (${COLS} blocchi). Righe: ${ROWS}. Vel: 10/sec.`;
            renderGrid();
        }

        function loadLevel() {
            const text = outputEl.value.trim();
            if (!text) return;
            const lines = text.split('\n').map(l => l.replace(/\r/g, '')).filter(l => l.length > 0);
            
            ROWS = lines.length;
            document.getElementById('rowsInput').value = ROWS;

            COLS = lines[0].length;
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].length !== COLS) { alert("Righe di lunghezza diversa."); return; }
            }

            const totalSeconds = Math.ceil(COLS / 10);
            document.getElementById('min').value = Math.floor(totalSeconds / 60);
            document.getElementById('sec').value = totalSeconds % 60;
            infoEl.innerText = `Livello caricato: ${Math.floor(totalSeconds / 60)}m ${totalSeconds % 60}s (${COLS} blocchi). Righe: ${ROWS}.`;

            mapData = Array(ROWS).fill().map(() => Array(COLS).fill('.'));
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    mapData[r][c] = lines[r][c] || '.';
                }
            }
            renderGrid();
        }

        async function fetchFromGitHub() {
            const levelId = document.getElementById('levelId').value || "1";
            const txtUrl = `https://raw.githubusercontent.com/neXPo83/tigtv/main/levels/level${levelId}.txt`;
            const mp3Url = `https://raw.githubusercontent.com/neXPo83/tigtv/main/levels/level${levelId}.mp3`;
            
            infoEl.innerText = `Connessione a GitHub per il livello ${levelId}...`;
            
            try {
                const responseTxt = await fetch(txtUrl + '?t=' + new Date().getTime());
                if (!responseTxt.ok) throw new Error("File TXT non trovato");
                const text = await responseTxt.text();
                outputEl.value = text;
                loadLevel(); 
                
                analysisStatus.innerText = "Download MP3 da GitHub e analisi in corso...";
                const responseMp3 = await fetch(mp3Url + '?t=' + new Date().getTime());
                if (responseMp3.ok) {
                    const arrayBuffer = await responseMp3.arrayBuffer();
                    const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                    audioPlayer.src = URL.createObjectURL(blob);
                    await analyzeAudioBuffer(arrayBuffer);
                } else {
                    analysisStatus.innerText = "File MP3 associato non trovato su GitHub.";
                }

                infoEl.innerText = `Livello ${levelId} (Testo e Audio) scaricati con successo da GitHub!`;
            } catch (e) {
                alert(`Errore: Impossibile scaricare level${levelId} da GitHub.\nDettagli: ${e.message}`);
                infoEl.innerText = `Errore di download.`;
            }
        }

        function downloadLevelFile() {
            const levelId = document.getElementById('levelId').value || "1";
            const fileName = `level${levelId}.txt`;
            const textContent = outputEl.value;

            if(!textContent) {
                alert("La mappa è vuota!");
                return;
            }

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.getElementById('toolbar').addEventListener('click', (e) => {
            const tool = e.target.closest('.tool');
            if(!tool) return;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            tool.classList.add('active');
            currentBrush = tool.dataset.brush;
        });

        function renderGrid() {
            gridEl.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;
            gridEl.innerHTML = '';
            
            const fragment = document.createDocumentFragment();
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.dataset.val = mapData[r][c];
                    cell.innerText = mapData[r][c];
                    
                    if (beatColumns.has(c)) {
                        cell.classList.add('beat-marker');
                    }
                    
                    cell.addEventListener('mousedown', () => paint(r, c, cell));
                    cell.addEventListener('mouseenter', (e) => {
                        if (e.buttons === 1) paint(r, c, cell); 
                    });
                    
                    fragment.appendChild(cell);
                }
            }
            gridEl.appendChild(fragment);
            updateOutput();
            validatePhysics();
        }

        function paint(r, c, cellEl) {
            if (mapData[r][c] !== currentBrush) {
                mapData[r][c] = currentBrush;
                cellEl.dataset.val = currentBrush;
                cellEl.innerText = currentBrush;
                updateOutput();
                validatePhysics();
            }
        }

        function updateOutput() {
            outputEl.value = mapData.map(row => row.join('')).join('\n');
        }

        function validatePhysics() {
            let warnings = [];
            
            for (let r = 0; r < ROWS; r++) {
                let rowString = mapData[r].join('');
                if (rowString.includes('^^^^')) { 
                    warnings.push(`- Troppe spine consecutive alla riga ${r + 1} (max 3).`); 
                }
            }
            
            let surfacesByCol = [];
            for (let c = 0; c < COLS; c++) {
                let colSurfaces = [];
                for (let r = 0; r < ROWS; r++) {
                    let cell = mapData[r][c];
                    if (cell === '#' || cell === '=' || cell === 'C' || cell === '◢' || cell === '◣') { 
                        if (r === 0 || mapData[r-1][c] === '.' || mapData[r-1][c] === '^') {
                            colSurfaces.push(ROWS - r); 
                        }
                    }
                }
                surfacesByCol.push(colSurfaces);
            }

            let gapCount = 0;
            
            for (let c = 0; c < COLS; c++) {
                let currentSurfaces = surfacesByCol[c];
                
                if (currentSurfaces.length === 0) {
                    gapCount++;
                    if (gapCount >= 5 && !warnings.some(w => w.includes("Voragine"))) { 
                        warnings.push(`- Voragine incolmabile intorno alla colonna ${c} (max 4 blocchi vuoti).`); 
                    }
                } else {
                    gapCount = 0;
                }
                
                if (c > 0 && currentSurfaces.length > 0) {
                    let prevSurfaces = [];
                    for (let lookBack = 1; lookBack <= 4; lookBack++) {
                        if (c - lookBack >= 0 && surfacesByCol[c - lookBack].length > 0) {
                            prevSurfaces = surfacesByCol[c - lookBack];
                            break; 
                        }
                    }

                    if (prevSurfaces.length > 0) {
                        let canPassColumn = false;
                        
                        for (let hCurr of currentSurfaces) {
                            for (let hPrev of prevSurfaces) {
                                let delta = hCurr - hPrev;
                                if (delta <= 2) { 
                                    canPassColumn = true;
                                    break;
                                }
                            }
                            if (canPassColumn) break;
                        }
                        
                        if (!canPassColumn && !warnings.some(w => w.includes(`Muro inarrivabile a colonna ${c}`))) {
                            warnings.push(`- Muro inarrivabile a colonna ${c} (nessun passaggio con salto <= 2 blocchi).`); 
                        }
                    }
                }
            }
            
            if (warnings.length > 0) {
                warningEl.innerText = "⚠️ ATTENZIONE:\n" + warnings.join("\n");
                warningEl.style.color = "#ff4444";
            } else {
                warningEl.innerText = "✔️ Livello fisicamente possibile.";
                warningEl.style.color = "#00ff00";
            }
        }

        initMap();
        renderGrid();
    </script>
</body>
</html>
